{% extends "base.html" %}

{% block content %}
<h2>Editar Demanda</h2>

<form method="POST" action="{{ url_for('editar', id=demanda['id']) }}">
    <div>
        <label>Seu nome (para validação de permissão):</label><br>
        <input type="text" name="nome_editor" required placeholder="Digite seu nome">
    </div>
    <br>

    <div>
        <label>Título:</label><br>
        <input type="text" name="titulo" value="{{ demanda['titulo'] }}" size="50" required>
    </div>
    <br>

    <div>
        <label>Descrição:</label><br>
        <textarea name="descricao" rows="5" cols="50" required>{{ demanda['descricao'] }}</textarea>
    </div>
    <br>

    <div>
        <label>Solicitante:</label><br>
        <input type="text" name="solicitante" value="{{ demanda['solicitante'] }}" required>
    </div>
    <br>

    <div>
        <label>Prioridade:</label>
        <small>(apenas o criador <strong>{{ demanda['solicitante'] }}</strong> pode alterar)</small><br>
        <select name="prioridade" required>
            {% for p in prioridades %}
                <option value="{{ p }}" {% if demanda['prioridade'] == p %}selected{% endif %}>{{ p }}</option>
            {% endfor %}
        </select>
    </div>
    <br>

    <div>
        <label>Data de Criação:</label><br>
        <input type="text" value="{{ demanda['data_criacao'] }}" disabled>
    </div>
    <br>

    <button type="submit">Atualizar</button>
    <a href="{{ url_for('index') }}"><button type="button">Cancelar</button></a>
</form>

{% endblock %}
