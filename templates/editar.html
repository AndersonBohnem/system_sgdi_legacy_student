{% extends "base.html" %}

{% block content %}
<h2>Editar Demanda</h2>

<form method="POST" action="{{ url_for('editar', id=demanda['id']) }}" class="form-card">
    <div>
        <label for="nome_editor">Seu nome (para validacao de permissao):</label><br>
        <input type="text" id="nome_editor" name="nome_editor" required placeholder="Digite seu nome">
    </div>

    <div>
        <label for="titulo">Titulo:</label><br>
        <input type="text" id="titulo" name="titulo" value="{{ demanda['titulo'] }}" size="50" required>
    </div>

    <div>
        <label for="descricao">Descricao:</label><br>
        <textarea id="descricao" name="descricao" rows="5" cols="50" required>{{ demanda['descricao'] }}</textarea>
    </div>

    <div>
        <label for="solicitante">Solicitante:</label><br>
        <input type="text" id="solicitante" name="solicitante" value="{{ demanda['solicitante'] }}" required>
    </div>

    <div>
        <label for="prioridade">Prioridade:</label>
        <small>(apenas o criador <strong>{{ demanda['solicitante'] }}</strong> pode alterar)</small><br>
        <select id="prioridade" name="prioridade" required>
            {% for prioridade in prioridades %}
                <option value="{{ prioridade }}" {% if demanda['prioridade'] == prioridade %}selected{% endif %}>
                    {{ prioridade }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label>Data de Criacao:</label><br>
        <input type="text" value="{{ demanda['data_criacao'] }}" disabled>
    </div>

    <div class="form-actions">
        <button type="submit">Atualizar</button>
        <a href="{{ url_for('detalhes', id=demanda['id']) }}" class="button-link secondary-link">Cancelar</a>
    </div>
</form>
{% endblock %}
