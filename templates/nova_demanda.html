{% extends "base.html" %}

{% block content %}
<h2>Nova Demanda</h2>

<form method="POST" action="{{ url_for('nova_demanda') }}">
    <div>
        <label>Título:</label><br>
        <input type="text" name="titulo" size="50" required>
    </div>
    <br>

    <div>
        <label>Descrição:</label><br>
        <textarea name="descricao" rows="5" cols="50" required></textarea>
    </div>
    <br>

    <div>
        <label>Solicitante:</label><br>
        <input type="text" name="solicitante" required>
    </div>
    <br>

    <div>
        <label>Prioridade:</label><br>
        <select name="prioridade" required>
            <option value="">-- Selecione --</option>
            {% for p in prioridades %}
                <option value="{{ p }}">{{ p }}</option>
            {% endfor %}
        </select>
    </div>
    <br>

    <button type="submit">Salvar</button>
    <a href="{{ url_for('index') }}"><button type="button">Cancelar</button></a>
</form>

{% endblock %}
