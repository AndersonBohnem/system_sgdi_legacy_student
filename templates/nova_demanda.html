{% extends "base.html" %}

{% block content %}
<h2>Nova Demanda</h2>

<form method="POST" action="{{ url_for('nova_demanda') }}" class="form-card">
    <div>
        <label for="titulo">Titulo:</label><br>
        <input type="text" id="titulo" name="titulo" size="50" value="{{ form_data.titulo }}" required>
    </div>

    <div>
        <label for="descricao">Descricao:</label><br>
        <textarea id="descricao" name="descricao" rows="5" cols="50" required>{{ form_data.descricao }}</textarea>
    </div>

    <div>
        <label for="solicitante">Solicitante:</label><br>
        <input type="text" id="solicitante" name="solicitante" value="{{ form_data.solicitante }}" required>
    </div>

    <div>
        <label for="prioridade">Prioridade:</label><br>
        <select id="prioridade" name="prioridade" required>
            <option value="">-- Selecione --</option>
            {% for prioridade in prioridades %}
                <option value="{{ prioridade }}" {% if form_data.prioridade == prioridade %}selected{% endif %}>
                    {{ prioridade }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-actions">
        <button type="submit">Salvar</button>
        <a href="{{ url_for('index') }}" class="button-link secondary-link">Cancelar</a>
    </div>
</form>
{% endblock %}
